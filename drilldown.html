<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Drill-down — Indicadores</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f8fafc;
  color: #0f172a;
  margin: 0;
  padding: 32px;
}

a { color: #0f172a; }

.voltar {
  display: inline-block;
  margin-bottom: 8px;
  font-size: 13px;
  color: #64748b;
  text-decoration: none;
}

.voltar:hover { color: #0f172a; }

.breadcrumb {
  font-size: 14px;
  margin-bottom: 20px;
  color: #64748b;
  min-height: 20px;
}

.breadcrumb a {
  color: #64748b;
  text-decoration: none;
}

.breadcrumb a:hover { color: rgb(216, 0, 115); }

.breadcrumb .atual {
  color: #0f172a;
  font-weight: 600;
}

.breadcrumb .sep {
  margin: 0 6px;
  color: #cbd5e1;
}

h1 {
  margin: 0 0 16px 0;
  font-size: 22px;
}

.card-ficha {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}

.ficha-name {
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.ficha-status {
  font-size: 12px;
  color: #64748b;
  margin-top: 4px;
}

.ficha-arvore {
  margin-top: 10px;
  font-size: 13px;
}

.ficha-pct {
  color: rgb(216, 0, 115);
  font-weight: 700;
}

.pivot-wrapper {
  overflow: auto;
  max-width: 100%;
  max-height: 600px;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
}

table.pivot {
  width: max-content;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}

table.pivot th,
table.pivot td {
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid #f1f5f9;
  border-right: 1px solid #f1f5f9;
  background: white;
  height: 60px;
  box-sizing: border-box;
}

table.pivot th {
  background: #f8fafc;
  color: #64748b;
  font-weight: 600;
  font-size: 11px;
  vertical-align: top;
  position: sticky;
  top: 0;
  z-index: 2;
}

/* Colunas fixas (sticky horizontal) */
table.pivot td.col-meta-nome { position: sticky; left: 0;   z-index: 1; }
table.pivot td.col-meta-tipo { position: sticky; left: 360px; z-index: 1; }
table.pivot td.col-meta-area {
  position: sticky;
  left: 490px;
  z-index: 1;
  box-shadow: 4px 0 4px -4px rgba(0, 0, 0, 0.1);
}

table.pivot th.col-meta-nome { position: sticky; left: 0;   top: 0; z-index: 3; }
table.pivot th.col-meta-tipo { position: sticky; left: 360px; top: 0; z-index: 3; }
table.pivot th.col-meta-area {
  position: sticky;
  left: 490px;
  top: 0;
  z-index: 3;
  box-shadow: 4px 0 4px -4px rgba(0, 0, 0, 0.1);
}

table.pivot th.col-meta-nome,
table.pivot th.col-meta-tipo,
table.pivot th.col-meta-area {
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* Larguras fixas das colunas-cabeçalho de meta */
table.pivot th.col-meta-nome,
table.pivot td.col-meta-nome { width: 360px; min-width: 360px; max-width: 360px; }

table.pivot th.col-meta-tipo,
table.pivot td.col-meta-tipo { width: 130px; min-width: 130px; max-width: 130px; }

table.pivot th.col-meta-area,
table.pivot td.col-meta-area { width: 130px; min-width: 130px; max-width: 130px; }

table.pivot th.col-colab {
  width: 90px;
  min-width: 90px;
  max-width: 90px;
  text-align: center;
}

table.pivot td.peso { width: 90px; }

table.pivot th.col-colab .colab-name,
table.pivot th.col-colab .colab-status,
table.pivot th.col-colab .colab-qtd {
  text-align: center;
}

/* Nome da meta com quebra em até 2 linhas */
table.pivot td.col-meta-nome {
  color: #475569;
  white-space: normal;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.35;
  vertical-align: middle;
}

table.pivot td.col-meta-tipo,
table.pivot td.col-meta-area {
  font-weight: 600;
  color: #0f172a;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  vertical-align: middle;
}

table.pivot td.col-meta-area {
  color: #475569;
  font-weight: 500;
}

table.pivot td.peso {
  text-align: center;
  vertical-align: middle;
  font-weight: 700;
  color: rgb(216, 0, 115);
}

table.pivot tbody tr:last-child td { border-bottom: none; }

.colab-name {
  font-weight: 600;
  font-size: 12px;
  color: #0f172a;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.colab-name a {
  text-decoration: none;
  color: #0f172a;
}

.colab-name a:hover { color: rgb(216, 0, 115); }

.colab-arrow {
  font-size: 10px;
  color: #94a3b8;
  margin-left: 2px;
}

.colab-status {
  font-size: 10px;
  color: #64748b;
  margin-top: 3px;
  text-transform: lowercase;
  letter-spacing: 0;
  font-weight: 500;
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  background: #f1f5f9;
}

.status-pill {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 500;
  text-transform: lowercase;
}

.status-NAO_ENVIADO { background: #f1f5f9; color: #475569; }
.status-PENDENTE_APROVACAO { background: #fef3c7; color: #92400e; }
.status-APROVADO { background: #dcfce7; color: #166534; }
.status-DEVOLVIDO { background: #fee2e2; color: #991b1b; }

.colab-qtd {
  font-size: 10px;
  color: #94a3b8;
  margin-top: 1px;
  font-weight: 400;
}

/* Linha de total no rodapé */
table.pivot tfoot td {
  background: #f8fafc;
  font-weight: 700;
  border-top: 2px solid #e2e8f0;
  position: sticky;
  bottom: 0;
  z-index: 2;
}

table.pivot tfoot td.col-total-label {
  position: sticky;
  left: 0;
  bottom: 0;
  z-index: 3;
  color: #64748b;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  box-shadow: 4px 0 4px -4px rgba(0, 0, 0, 0.1);
}

table.pivot tfoot td.peso-total { color: rgb(216, 0, 115); }

</style>
</head>

<script>
(function () {
  const dados = JSON.parse(document.getElementById('dados').textContent);

  const STATUS_LABELS = {
    "NAO_ENVIADO": "não enviado",
    "PENDENTE_APROVACAO": "pendente",
    "APROVADO": "aprovado",
    "DEVOLVIDO": "devolvido"
  };

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s == null ? '' : String(s);
    return div.innerHTML;
  }

  function formatPeso(num) {
    if (num === Math.floor(num)) return Math.floor(num) + "%";
    return num.toFixed(1) + "%";
  }

  // --- Construção da pivot a partir dos filhos diretos do nó atual ---

  function construirPivotJS(filhosIds) {
    const colabs = filhosIds.map(id => {
      const no = dados.nos[id];
      const cs = (dados.contratos_por_colab[id] || []).filter(c => c.peso > 0);
      const status = cs.length > 0 ? cs[0].status : "NAO_ENVIADO";
      const metasUnicas = new Set(cs.map(c => c.meta_id));
      return {
        id: no.id,
        name: no.name,
        status: status,
        qtd_metas: metasUnicas.size,
        eh_gestor: no.filhos_ids.length > 0
      };
    }).sort((a, b) => a.name.localeCompare(b.name));

    const metasMap = {};
    const pesos = {};
    const totais = {};
    filhosIds.forEach(id => { totais[id] = 0; });

    for (const cid of filhosIds) {
      const cs = (dados.contratos_por_colab[cid] || []).filter(c => c.peso > 0);
      for (const c of cs) {
        if (!metasMap[c.meta_id]) {
          metasMap[c.meta_id] = {
            id: c.meta_id, codigo: c.codigo, nome: c.nome,
            tipo: c.tipo, area: c.area
          };
        }
        pesos[c.meta_id + "::" + cid] = formatPeso(c.peso);
        totais[cid] += c.peso;
      }
    }

    const metas = Object.values(metasMap).sort((a, b) => {
      if (a.tipo !== b.tipo) return a.tipo.localeCompare(b.tipo);
      if (a.area !== b.area) return a.area.localeCompare(b.area);
      return a.nome.localeCompare(b.nome);
    });

    return { colabs, metas, pesos, totais };
  }

  // --- Render das views ---

  function renderPivotHtml(pivot) {
    const headersColabs = pivot.colabs.map(c => {
      const nomeHtml = c.eh_gestor
        ? '<a href="#gestor=' + c.id + '">' + escapeHtml(c.name) + '</a> <span class="colab-arrow">↓</span>'
        : escapeHtml(c.name);
      return '<th class="col-colab">'
        + '<div class="colab-name">' + nomeHtml + '</div>'
        + '<div class="colab-status status-' + escapeHtml(c.status) + '">' + escapeHtml(STATUS_LABELS[c.status] || c.status) + '</div>'
        + '<div class="colab-qtd">' + c.qtd_metas + ' metas</div>'
        + '</th>';
    }).join('');

    const head = '<thead><tr>'
      + '<th class="col-meta-nome">Nome da Meta</th>'
      + '<th class="col-meta-tipo">Tipo</th>'
      + '<th class="col-meta-area">Área</th>'
      + headersColabs
      + '</tr></thead>';

    const linhas = pivot.metas.map(m => {
      const tipoLabel = m.tipo.replace(/_/g, ' ');
      const areaLabel = m.area.replace(/_/g, ' ');
      const cells = pivot.colabs.map(c => {
        const peso = pivot.pesos[m.id + "::" + c.id] || '';
        return '<td class="peso">' + escapeHtml(peso) + '</td>';
      }).join('');
      return '<tr>'
        + '<td class="col-meta-nome" title="' + escapeHtml(m.nome) + '">' + escapeHtml(m.nome) + '</td>'
        + '<td class="col-meta-tipo">' + escapeHtml(tipoLabel) + '</td>'
        + '<td class="col-meta-area">' + escapeHtml(areaLabel) + '</td>'
        + cells + '</tr>';
    }).join('');

    const totaisCells = pivot.colabs.map(c => {
      const total = Math.round((pivot.totais[c.id] || 0) * 10) / 10;
      return '<td class="peso peso-total">' + escapeHtml(formatPeso(total)) + '</td>';
    }).join('');
    const foot = '<tfoot><tr class="row-total">'
      + '<td class="col-total-label" colspan="3">Total</td>'
      + totaisCells
      + '</tr></tfoot>';

    return '<div class="pivot-wrapper"><table class="pivot">'
      + head + '<tbody>' + linhas + '</tbody>' + foot + '</table></div>';
  }

  function montarBreadcrumb(diretorSlug, ancestralIds, atual) {
    const dir = dados.diretores[diretorSlug];
    const partes = ['<a href="#diretor=' + escapeHtml(diretorSlug) + '">'
      + escapeHtml(dir.name) + '</a>'];
    for (const aid of ancestralIds) {
      const a = dados.nos[aid];
      partes.push('<a href="#gestor=' + aid + '">' + escapeHtml(a.name) + '</a>');
    }
    partes.push('<span class="atual">' + escapeHtml(atual) + '</span>');
    return partes.join('<span class="sep">›</span>');
  }

  function renderDiretor(slug) {
    const dir = dados.diretores[slug];
    if (!dir) { renderHome("Diretor não encontrado"); return; }
    document.getElementById('breadcrumb').innerHTML =
      '<span class="atual">' + escapeHtml(dir.name) + '</span>';
    document.getElementById('titulo').textContent = dir.name;
    document.getElementById('ficha').innerHTML = '';
    const pivot = construirPivotJS(dir.raizes_ids);
    document.getElementById('conteudo').innerHTML = renderPivotHtml(pivot);
  }

  function renderGestor(id) {
    const no = dados.nos[id];
    if (!no) { renderHome("Gestor não encontrado"); return; }
    document.getElementById('breadcrumb').innerHTML =
      montarBreadcrumb(no.diretor_slug, no.pais_ids, no.name);
    document.getElementById('titulo').textContent = no.name;
    const pct = no.qtd_diretos > 0
      ? Math.round((no.preenchido_diretos / no.qtd_diretos) * 100)
      : 0;
    document.getElementById('ficha').innerHTML =
      '<div class="card-ficha">'
      + '<div class="ficha-name">' + escapeHtml(no.name) + '</div>'
      + '<div class="ficha-status">contrato próprio: '
      + '<span class="status-pill status-' + escapeHtml(no.status_propio) + '">'
      + escapeHtml(STATUS_LABELS[no.status_propio] || no.status_propio) + '</span></div>'
      + '<div class="ficha-arvore">reportes diretos: ' + no.preenchido_diretos + ' de '
      + no.qtd_diretos + ' preenchidos · <span class="ficha-pct">'
      + pct + '%</span></div>'
      + '</div>';
    const pivot = construirPivotJS(no.filhos_ids);
    document.getElementById('conteudo').innerHTML = renderPivotHtml(pivot);
  }

  function renderHome(msg) {
    document.getElementById('breadcrumb').innerHTML = '';
    document.getElementById('titulo').textContent = msg || 'Selecione um diretor';
    document.getElementById('ficha').innerHTML = '';
    document.getElementById('conteudo').innerHTML =
      '<p>Volte ao <a href="dashboard.html">dashboard</a> e clique em um diretor.</p>';
  }

  // --- Roteamento por hash ---

  function render() {
    const params = new URLSearchParams(location.hash.slice(1));
    if (params.has('diretor')) renderDiretor(params.get('diretor'));
    else if (params.has('gestor')) renderGestor(params.get('gestor'));
    else renderHome();
  }

  window.addEventListener('hashchange', render);
  if (document.readyState === 'loading') {
    window.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();

</script>
