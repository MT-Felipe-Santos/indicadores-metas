<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores e Metas</title>

    <style>
        /* Remove as margens padrão da página */
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Evita barra de rolagem dupla */
        }

        /* Configura o iframe para ocupar toda a tela sem bordas */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <iframe src="dashboard.html" title="Dashboard de Indicadores e Metas"></iframe>

</body>

</html>
